name: tontinepro_collecteur
description: TontineBénin — Application terrain collecteurs (Agent, Indépendant, Superviseur)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.5.1
  go_router: ^14.2.0
  dio: ^5.4.3+1
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0
  mobile_scanner: ^6.0.5
  qr_flutter: ^4.1.0
  geolocator: ^12.0.0
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.0
  intl: ^0.20.2
  equatable: ^2.0.5
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.1.4

  # Base locale offline (Drift + SQLite)
  drift: ^2.20.0
  drift_flutter: ^0.2.0
  path_provider: ^2.1.4
  path: ^1.9.0
  permission_handler: ^11.3.1
  fl_chart: ^1.2.0
  shimmer: ^3.0.0
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  signature: ^5.5.0
  http: ^1.2.1

  # Firebase / Notifications push
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  drift_dev: ^2.20.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
