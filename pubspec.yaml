publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.5.1
  go_router: ^14.0.0
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.2.0
  mobile_scanner: ^6.0.0
  qr_flutter: ^4.1.0
  geolocator: ^12.0.0
  google_fonts: ^6.2.0
  cached_network_image: ^3.4.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.7.0
  riverpod_lint: ^2.4.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
