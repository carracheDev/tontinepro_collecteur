name: tontinepro_collecteur
description: TontineBénin — Application terrain collecteurs (Agent, Indépendant, Superviseur)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.5.1
  go_router: ^14.0.0
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.2.0
  mobile_scanner: ^6.0.0
  qr_flutter: ^4.1.0
  geolocator: ^12.0.0
  google_fonts: ^6.2.0
  cached_network_image: ^3.4.0
  intl: ^0.20.2
  equatable: ^2.0.5
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.1.4
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
